
<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8"/>
<title>เที่ยวนี่เหอะ 🚐✨</title>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"><\/script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#06090f;--bg2:#0c1421;--bg3:#101b2e;--blue:#38bdf8;--blue2:#0284c7;--green:#10b981;--red:#ef4444;--yellow:#f59e0b;--text:#f1f5f9;--muted:#64748b;--sub:#94a3b8;--border:rgba(255,255,255,0.06)}
html,body{font-family:'IBM Plex Sans Thai',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
.page{display:none}
.page.show{display:block;animation:fadeUp .28s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
#loginWrap{position:fixed;inset:0;z-index:9000;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px 20px;background:radial-gradient(ellipse 80% 50% at 50% -10%,rgba(56,189,248,.18),transparent),radial-gradient(ellipse 60% 40% at 80% 110%,rgba(16,185,129,.1),transparent),var(--bg);transition:opacity .55s cubic-bezier(.4,0,.2,1),transform .55s cubic-bezier(.4,0,.2,1)}
#loginWrap.out{opacity:0;transform:scale(1.06) translateY(-12px);pointer-events:none}
#loginWrap.gone{display:none}
.login-logo{text-align:center;margin-bottom:32px}
.login-logo img{width:96px;height:96px;border-radius:50%;border:3px solid var(--blue);box-shadow:0 0 0 8px rgba(56,189,248,.08),0 0 32px rgba(56,189,248,.3);object-fit:cover;display:block;margin:0 auto 14px}
.login-logo h1{font-size:32px;font-weight:800;color:var(--blue);letter-spacing:-.5px}
.login-logo p{font-size:13px;color:var(--sub);margin-top:4px}
.login-card{width:100%;max-width:370px;background:rgba(12,20,33,.9);border:1px solid rgba(56,189,248,.12);border-radius:28px;padding:28px 22px;box-shadow:0 24px 60px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.04)}
.login-card h2{font-size:20px;font-weight:700;color:#fff;margin-bottom:6px}
.login-card>p{font-size:13px;color:var(--sub);margin-bottom:24px;line-height:1.65}
.inp-row{position:relative;margin-bottom:14px}
.inp-icon{position:absolute;left:15px;top:50%;transform:translateY(-50%);font-size:16px;pointer-events:none;z-index:1}
.inp-field{width:100%;height:52px;background:rgba(255,255,255,.04);border:1.5px solid rgba(255,255,255,.08);border-radius:16px;color:#fff;font-size:15px;font-family:inherit;padding:0 16px 0 50px;outline:none;transition:border-color .2s,background .2s}
.inp-field:focus{border-color:var(--blue);background:rgba(56,189,248,.04)}
.inp-field::placeholder{color:var(--muted)}
.btn-login{width:100%;height:52px;border:none;border-radius:16px;background:linear-gradient(135deg,var(--blue2),var(--blue));color:#fff;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;transition:all .2s;box-shadow:0 8px 24px rgba(2,132,199,.35);margin-top:4px}
.btn-login:active{transform:scale(.98)}
.btn-login:disabled{background:rgba(255,255,255,.06);color:var(--muted);box-shadow:none;cursor:not-allowed}
.login-note{font-size:11px;color:var(--muted);text-align:center;margin-top:14px}
#appShell{opacity:0;transition:opacity .4s ease;min-height:100vh;display:none}
#appShell.show{opacity:1}
.hdr{position:sticky;top:0;z-index:400;background:rgba(6,9,15,.88);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:11px 16px;display:flex;align-items:center;justify-content:space-between}
.hdr-brand{display:flex;align-items:center;gap:10px;cursor:pointer}
.hdr-brand img{width:42px;height:42px;border-radius:50%;border:2px solid var(--blue);object-fit:cover;box-shadow:0 0 12px rgba(56,189,248,.25)}
.hdr-brand h1{font-size:19px;font-weight:800;color:var(--blue);line-height:1.1}
.hdr-brand span{font-size:10px;color:rgba(255,255,255,.6);display:block}
.hdr-btn{background:rgba(255,255,255,.04);border:1px solid var(--border);color:#fff;padding:8px 13px;border-radius:12px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:.2s;white-space:nowrap}
.bnav{position:fixed;bottom:0;left:0;width:100%;background:rgba(6,9,15,.94);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-top:1px solid var(--border);display:flex;z-index:400;padding-bottom:env(safe-area-inset-bottom,4px)}
.bi{flex:1;display:flex;flex-direction:column;align-items:center;padding:9px 0 10px;cursor:pointer;gap:3px;transition:.15s}
.bi .ico{font-size:23px}
.bi .lbl{font-size:10px;font-weight:600;color:var(--muted);transition:.15s}
.bi.on .lbl{color:var(--blue)}
.bi.on .ico{filter:drop-shadow(0 0 5px rgba(56,189,248,.5))}
.main{max-width:480px;margin:0 auto;padding:16px 16px 96px}
.greet{display:flex;align-items:center;justify-content:space-between;background:linear-gradient(135deg,rgba(2,132,199,.14),rgba(56,189,248,.06));border:1px solid rgba(56,189,248,.14);border-radius:20px;padding:14px 16px;margin-bottom:22px}
.greet-txt h2{font-size:15px;font-weight:700;color:#fff}
.greet-txt p{font-size:12px;color:var(--sub);margin-top:3px}
.greet-ava{width:46px;height:46px;border-radius:50%;flex-shrink:0;background:linear-gradient(135deg,var(--blue2),var(--blue));display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 0 18px rgba(56,189,248,.3)}
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.sec-hdr h3{font-size:16px;font-weight:700;color:#fff;display:flex;align-items:center;gap:7px}
.trip-list{display:flex;flex-direction:column;gap:11px}
.thc{display:flex;align-items:stretch;background:var(--bg2);border:1px solid var(--border);border-radius:20px;overflow:hidden;cursor:pointer;transition:.2s;min-height:96px}
.thc:active{transform:scale(.99)}
.thc:hover{border-color:rgba(56,189,248,.3)}
.thc-img{width:108px;flex-shrink:0;position:relative}
.thc-img img{width:100%;height:100%;object-fit:cover}
.thc-badge{position:absolute;top:8px;left:8px;padding:3px 8px;border-radius:8px;font-size:10px;font-weight:700}
.b-open{background:rgba(16,185,129,.85);color:#fff}
.b-hot{background:rgba(239,68,68,.85);color:#fff}
.b-soon{background:rgba(245,158,11,.9);color:#000}
.thc-lock{position:absolute;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;font-size:24px}
.thc-body{padding:12px;flex:1;display:flex;flex-direction:column;justify-content:space-between}
.thc-body h4{font-size:14px;font-weight:700;color:#fff;line-height:1.3;margin-bottom:2px}
.thc-loc{font-size:11px;color:var(--sub);margin-bottom:7px}
.thc-meta{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:4px}
.seat-ok{font-size:11px;font-weight:600;color:var(--green)}
.seat-low{font-size:11px;font-weight:600;color:var(--yellow)}
.seat-full{font-size:11px;font-weight:600;color:var(--red)}
.thc-price{font-size:13px;font-weight:700;color:var(--blue)}
.thc-date{font-size:10px;color:#fff;background:rgba(255,255,255,.07);padding:3px 8px;border-radius:7px;margin-top:5px;display:inline-block}
.thc-arr{display:flex;align-items:center;padding-right:12px;color:rgba(56,189,248,.6);font-size:18px;flex-shrink:0}
.past-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.pc{border-radius:16px;overflow:hidden;position:relative;cursor:pointer;aspect-ratio:3/4;background:var(--bg2)}
.pc img{width:100%;height:100%;object-fit:cover;filter:brightness(.65)}
.pc-star{position:absolute;top:7px;right:7px;font-size:9px;background:rgba(0,0,0,.65);color:#fbbf24;padding:2px 6px;border-radius:6px;font-weight:700}
.pc-info{position:absolute;bottom:0;left:0;right:0;padding:8px;background:linear-gradient(to top,rgba(0,0,0,.88),transparent)}
.pc-info h5{font-size:10px;font-weight:700;color:#fff;line-height:1.3}
.pc-info p{font-size:9px;color:var(--sub)}
.stat-bar{display:flex;align-items:center;gap:10px;background:linear-gradient(135deg,rgba(56,189,248,.07),rgba(16,185,129,.04));border:1px solid rgba(56,189,248,.1);border-radius:18px;padding:14px 16px;margin-top:18px}
.stat-bar .ico{font-size:26px}
.stat-bar .txt h4{font-size:13px;color:#fff;font-weight:700}
.stat-bar .txt p{font-size:11px;color:var(--sub);margin-top:2px}
.admin-box{background:linear-gradient(180deg,rgba(12,21,36,.98),rgba(6,11,20,.99));border:1px solid rgba(255,255,255,.05);border-radius:24px;padding:20px;margin-top:18px}
.divider{height:1px;background:var(--border);margin:22px 0}
.srch{position:relative;margin-bottom:18px}
.srch input{width:100%;height:46px;padding:0 16px 0 44px;background:var(--bg2);border:1px solid var(--border);border-radius:14px;color:#fff;font-size:14px;font-family:inherit;outline:none;transition:.2s}
.srch input:focus{border-color:var(--blue)}
.srch .si{position:absolute;left:15px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:15px}
.profile-card{background:linear-gradient(135deg,rgba(2,132,199,.16),rgba(16,185,129,.08));border:1px solid rgba(56,189,248,.15);border-radius:24px;padding:20px;margin-bottom:20px;display:flex;align-items:center;gap:16px}
.pava{width:60px;height:60px;border-radius:50%;flex-shrink:0;background:linear-gradient(135deg,var(--blue2),var(--blue));display:flex;align-items:center;justify-content:center;font-size:28px;box-shadow:0 0 22px rgba(56,189,248,.3)}
.pinfo h3{font-size:17px;font-weight:700;color:#fff}
.pinfo p{font-size:12px;color:var(--sub);margin-top:3px}
.pstats{display:flex;gap:20px;margin-top:10px}
.pstat h4{font-size:22px;font-weight:800;color:var(--blue);line-height:1}
.pstat p{font-size:10px;color:var(--sub);margin-top:2px}
.hitem{display:flex;align-items:center;gap:12px;background:var(--bg2);border:1px solid var(--border);border-radius:18px;padding:13px;margin-bottom:10px;transition:.2s}
.hitem:hover{border-color:rgba(56,189,248,.25)}
.hitem img{width:56px;height:56px;border-radius:13px;object-fit:cover;flex-shrink:0}
.hitem-info{flex:1}
.hitem-info h4{font-size:14px;font-weight:700;color:#fff;margin-bottom:4px}
.hitem-info p{font-size:11px;color:var(--sub)}
.hitem-seat{text-align:right;flex-shrink:0}
.hitem-seat .snum{font-size:20px;font-weight:800;color:var(--blue);line-height:1}
.hitem-seat p{font-size:10px;color:var(--muted);margin-top:2px}
.empty-st{text-align:center;padding:48px 20px;color:var(--muted)}
.empty-st .eico{font-size:52px;margin-bottom:12px}
.empty-st p{font-size:14px;line-height:1.7}
.nitem{display:flex;gap:12px;background:var(--bg2);border:1px solid var(--border);border-radius:18px;padding:14px;margin-bottom:10px}
.ndot{width:9px;height:9px;border-radius:50%;background:var(--blue);flex-shrink:0;margin-top:4px}
.ndot.r{background:var(--muted)}
.ninfo h4{font-size:13px;font-weight:700;color:#fff;margin-bottom:4px}
.ninfo p{font-size:12px;color:var(--sub);line-height:1.55}
.ntime{font-size:10px;color:var(--muted);margin-top:6px}
.chip{display:inline-block;padding:4px 10px;border-radius:999px;font-size:11px;font-weight:600}
.ch-blue{background:rgba(56,189,248,.12);color:var(--blue)}
.ch-green{background:rgba(16,185,129,.12);color:var(--green)}
.ch-yellow{background:rgba(245,158,11,.12);color:var(--yellow)}
.ch-red{background:rgba(239,68,68,.12);color:var(--red)}
.sheet-bg{position:fixed;inset:0;z-index:700;background:rgba(0,0,0,.78);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);display:none;align-items:flex-end;justify-content:center}
.sheet-bg.show{display:flex}
.sheet{width:100%;max-width:480px;max-height:93vh;background:var(--bg2);border-radius:28px 28px 0 0;overflow-y:auto;padding-bottom:28px;animation:su .32s cubic-bezier(.4,0,.2,1);position:relative}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet-pill{display:block;width:38px;height:4px;background:rgba(255,255,255,.18);border-radius:4px;margin:12px auto 0}
.sheet-img{width:100%;height:220px;object-fit:cover}
.sheet-x{position:absolute;top:14px;right:14px;width:36px;height:36px;border-radius:50%;background:rgba(0,0,0,.55);border:none;color:#fff;font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(8px);z-index:10}
.sheet-body{padding:18px}
.sheet-body h2{font-size:22px;font-weight:800;color:#fff;margin-bottom:6px}
.sheet-date{font-size:13px;color:var(--blue);margin-bottom:14px}
.sheet-price{display:inline-flex;align-items:center;gap:8px;background:linear-gradient(135deg,rgba(16,185,129,.14),rgba(56,189,248,.09));border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:10px 16px;font-size:14px;font-weight:700;color:#fff;margin-bottom:18px}
.sheet-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.sgc{background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:14px;padding:12px}
.sgc span{display:block;font-size:11px;color:var(--sub);margin-bottom:5px}
.sgc strong{font-size:14px;color:#fff}
.sheet-hl{background:linear-gradient(180deg,rgba(56,189,248,.07),rgba(56,189,248,.02));border:1px solid rgba(56,189,248,.1);border-radius:16px;padding:14px;font-size:13px;line-height:1.75;color:#e2e8f0;margin-bottom:16px}
.sheet-srow{display:flex;align-items:center;justify-content:space-between;background:rgba(255,255,255,.02);border:1px solid var(--border);border-radius:14px;padding:12px 16px;margin-bottom:16px}
.avail{font-size:13px;font-weight:700}
.av-ok{color:var(--green)}.av-low{color:var(--yellow)}.av-full{color:var(--red)}
.btn-book{width:100%;height:52px;border:none;border-radius:18px;background:linear-gradient(135deg,var(--blue2),var(--blue));color:#fff;font-size:16px;font-weight:700;font-family:inherit;cursor:pointer;box-shadow:0 8px 24px rgba(2,132,199,.35);transition:.2s}
.btn-book:active{transform:scale(.98)}
.btn-book:disabled{background:rgba(255,255,255,.06);color:var(--muted);box-shadow:none;cursor:not-allowed}
#bookingPage{position:fixed;inset:0;z-index:800;background:var(--bg);overflow-y:auto;display:none}
#bookingPage.show{display:block;animation:fadeUp .25s ease}
.bk-hdr{display:flex;align-items:center;gap:12px;padding:13px 16px;border-bottom:1px solid var(--border);position:sticky;top:0;background:rgba(6,9,15,.92);backdrop-filter:blur(16px);z-index:10}
.btn-back{background:none;border:none;color:var(--blue);font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:5px}
.bk-body{max-width:480px;margin:0 auto;padding:16px 16px 120px}
.ig{margin-bottom:16px}
.ig label{display:block;font-size:13px;color:var(--sub);font-weight:600;margin-bottom:8px}
.ig input{width:100%;height:48px;background:var(--bg3);border:1.5px solid var(--border);border-radius:13px;color:#fff;font-size:14px;font-family:inherit;padding:0 14px;outline:none;transition:.2s}
.ig input:disabled{color:var(--muted);cursor:not-allowed}
.ig input:focus{border-color:var(--blue)}
.van-blk{margin-bottom:20px}
.van-ttl{font-size:13px;color:var(--blue);font-weight:700;text-align:center;background:linear-gradient(180deg,rgba(10,28,46,.98),rgba(6,14,26,.98));padding:11px;border-radius:16px;margin-bottom:9px;box-shadow:0 4px 14px rgba(0,0,0,.2)}
.van-dir{display:flex;justify-content:space-between;padding:0 8px;margin-bottom:6px;font-size:11px;font-weight:700;color:var(--blue);opacity:.75}
.van-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:10px;background:linear-gradient(180deg,rgba(14,26,42,.98),rgba(8,16,30,.98));border-radius:22px;border:1px solid rgba(255,255,255,.03);box-shadow:inset 0 1px 0 rgba(255,255,255,.04),0 6px 20px rgba(0,0,0,.25);position:relative;overflow:hidden}
.van-grid::after{content:"";position:absolute;inset:0;background:radial-gradient(circle at top,rgba(56,189,248,.05),transparent 55%);pointer-events:none}
.seat{aspect-ratio:1;border-radius:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-weight:700;transition:.16s;transform:scale(.94);cursor:pointer;overflow:hidden}
.seat span:first-child{font-size:9px;margin-bottom:1px}
.seat span:last-child{font-size:14px;line-height:1.1}
.seat.driver{background:linear-gradient(145deg,#1e2e42,#162234);color:#4a6080;border:2px dashed rgba(255,255,255,.12);cursor:default;pointer-events:none}
.seat.spacer{visibility:hidden;pointer-events:none}
.seat.empty{background:linear-gradient(145deg,#16b472,#10a060);color:#fff;box-shadow:0 5px 0 #0b7a4a,0 8px 16px rgba(16,180,114,.15)}
.seat.booked{background:linear-gradient(145deg,#f03a3a,#cc1a2a);color:#fff;box-shadow:0 5px 0 #991222,0 8px 16px rgba(240,58,58,.15);cursor:not-allowed}
.seat.selected{background:linear-gradient(145deg,#ffd84d,#f5b800);color:#000;transform:scale(.97);box-shadow:0 0 14px rgba(255,216,77,.5),0 5px 0 #b08000;animation:hb .9s infinite}
.seat.hidden-seat{background:linear-gradient(145deg,rgba(14,22,36,.98),rgba(6,10,18,.98));color:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.03);pointer-events:none;cursor:default}
@keyframes hb{0%,100%{transform:scale(.97)}50%{transform:scale(1.01)}}
.seat-legend{display:flex;align-items:center;justify-content:center;gap:14px;margin:12px 0 18px;padding:10px 14px;border-radius:16px;background:rgba(12,20,33,.9);border:1px solid var(--border)}
.leg{font-size:12px;font-weight:600;color:#e2e8f0}
.seat-map-img{width:100%;border-radius:13px;margin-bottom:8px;border:1px solid var(--border)}
.fsec{font-size:13px;color:var(--sub);font-weight:600;border-bottom:1px solid var(--border);padding-bottom:8px;margin:22px 0 16px}
#formBox{display:none}
#formBox.show{display:block;animation:fadeUp .3s ease}
.sbar{position:fixed;bottom:0;left:0;width:100%;background:rgba(6,9,15,.9);backdrop-filter:blur(18px);padding:13px 16px 28px;border-top:1px solid var(--border);z-index:20;display:flex;justify-content:center}
.btn-conf{width:100%;max-width:440px;height:50px;border:none;border-radius:14px;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;background:rgba(255,255,255,.04);color:var(--muted);transition:.25s}
.btn-conf.on{background:linear-gradient(135deg,var(--blue2),var(--blue));color:#fff;box-shadow:0 6px 22px rgba(2,132,199,.3)}
.pay-bg{position:fixed;inset:0;z-index:900;background:rgba(3,6,12,.9);backdrop-filter:blur(10px);display:none;align-items:center;justify-content:center;padding:16px}
.pay-bg.show{display:flex}
.pay-box{background:var(--bg2);width:100%;max-width:360px;border-radius:24px;padding:24px 20px;text-align:center;border:1px solid var(--border);box-shadow:0 24px 48px rgba(0,0,0,.55);position:relative}
.pay-x{position:absolute;top:14px;right:14px;width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.07);border:none;color:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.pay-box h3{font-size:20px;font-weight:700;color:var(--yellow);margin-bottom:4px}
.pay-box .psub{font-size:12px;color:var(--red)}
.qr{width:180px;border-radius:14px;border:4px solid #fff;margin:16px auto;display:block;box-shadow:0 6px 18px rgba(0,0,0,.35)}
.chk-row{display:flex;align-items:flex-start;gap:10px;text-align:left;color:#cbd5e1;font-size:12px;margin:16px 0;background:rgba(255,255,255,.02);padding:10px;border-radius:12px;border:1px solid rgba(255,255,255,.04)}
.chk-row input{width:16px;height:16px;margin-top:2px;flex-shrink:0;cursor:pointer}
.btn-pay{width:100%;height:48px;border-radius:13px;border:none;background:var(--green);color:#fff;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;transition:.2s}
.btn-pay:disabled{background:rgba(255,255,255,.06);color:var(--muted);cursor:not-allowed}
#successPage{position:fixed;inset:0;z-index:1000;background:var(--bg);display:none;overflow-y:auto}
#successPage.show{display:block;animation:fadeUp .3s ease}
.succ-body{max-width:440px;margin:0 auto;padding:48px 20px;text-align:center}
.succ-ico{width:76px;height:76px;border-radius:50%;background:var(--green);display:flex;align-items:center;justify-content:center;font-size:38px;color:#fff;margin:0 auto 22px;box-shadow:0 0 28px rgba(16,185,129,.45)}
.receipt{background:#fff;color:#1e293b;border-radius:20px;padding:22px;text-align:left;box-shadow:0 12px 28px rgba(0,0,0,.3);margin:22px 0}
.rrow{display:flex;align-items:center;gap:8px;margin-bottom:11px;font-size:14px;font-weight:500}
.rrow span{color:#64748b;font-weight:400}
.rseat{background:#f0fdf4;border:1px dashed #bbf7d0;padding:14px;border-radius:14px;text-align:center;margin-top:14px}
.rseat p{font-size:11px;color:#16a34a;font-weight:600}
.rseat h3{font-size:44px;font-weight:800;color:#15803d;line-height:1}
.btn-home{width:100%;height:50px;border-radius:14px;border:none;background:linear-gradient(135deg,var(--blue2),var(--blue));color:#fff;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;box-shadow:0 6px 18px rgba(2,132,199,.25);margin-top:10px}
.drawer{position:fixed;top:0;right:-100%;width:86%;max-width:340px;height:100%;background:#080e1a;z-index:600;transition:.38s cubic-bezier(.4,0,.2,1);padding:22px 16px;overflow-y:auto;box-shadow:-12px 0 32px rgba(0,0,0,.55);border-left:1px solid var(--border)}
.drawer.open{right:0}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.68);z-index:599;display:none;backdrop-filter:blur(5px)}
.info-blk{background:rgba(255,255,255,.02);padding:12px;border-radius:11px;margin-bottom:8px;border-left:3px solid var(--yellow);font-size:12px;line-height:1.55}
.mgrid{display:grid;grid-template-columns:1fr;gap:11px;margin-top:10px}
.mgrid img{width:100%;border-radius:13px;border:1px solid var(--border)}
.btn-logout{width:100%;height:46px;border-radius:13px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;margin-top:6px;transition:.2s}
.btn-logout:hover{background:rgba(239,68,68,.1);color:var(--red);border-color:rgba(239,68,68,.25)}
</style>

function initLogin(){
  const p=document.getElementById('lPhone'),n=document.getElementById('lNick'),b=document.getElementById('lBtn');

function doLogin(){
  const phone=document.getElementById('lPhone').value.trim();

  if(!phone||!nick)return;
  user={phone,nick};
  localStorage.setItem('tnhUser',JSON.stringify(user));
  const lw=document.getElementById('loginWrap');
  lw.classList.add('out');
  setTimeout(()=>{lw.classList.add('gone');bootApp();},560);
}
function bootApp(){
  const s=document.getElementById('appShell');
  s.style.display='block';
  requestAnimationFrame(()=>requestAnimationFrame(()=>s.classList.add('show')));
  document.getElementById('fPhone').value=user.phone;
  document.getElementById('fNick').value=user.nick;
  fetchData();
}
window.addEventListener('DOMContentLoaded',()=>{
  initLogin();
  try{const s=localStorage.getItem('tnhUser');if(s){user=JSON.parse(s);document.getElementById('loginWrap').classList.add('gone');bootApp();}}catch(e){localStorage.removeItem('tnhUser');}
});

// DATA
function fetchData(){
  const cb='cb_'+Date.now();
  window[cb]=(res)=>{
    allBookings=res.bookings||[];
    const seen={};cacheTrips=[];
    allBookings.forEach(b=>{if(!b.trip||!b.date)return;const k=b.trip+'_'+b.date;if(!seen[k]){seen[k]=1;cacheTrips.push({trip:b.trip,date:b.date});}});
    renderHome();renderTripList(cacheTrips);renderMyTrips();renderNotif();
    delete window[cb];
  };
  appendScript(QUERY_URL+'&callback='+cb);
}
function loadSeats(dateStr){
  ['A','B','C'].forEach(p=>{document.getElementById('v'+p).innerHTML='<p style="grid-column:span 4;text-align:center;color:var(--blue);font-size:11px;padding:12px">⌛ อัปเดต...</p>';});
  const cb='cbs_'+Date.now();
  window[cb]=(res)=>{renderVans(res.bookings||[]);delete window[cb];};
  appendScript(QUERY_URL+'&date='+encodeURIComponent(dateStr)+'&callback='+cb);
}

function thcHTML(item){
  const info=TRIP_DETAILS[item.trip]||{};

  const d=new Date(item.date);
  const fmt=d.toLocaleDateString('th-TH',{day:'numeric',month:'short',year:'2-digit'});

  const avail=30-booked;

  else{av.innerText=`เหลือ ${avail} ที่จาก 30`;av.className='avail '+(avail<=5?'av-low':'av-ok');st.innerText='เปิดจอง';st.className='chip ch-green';btn.disabled=false;btn.innerText='จองที่นั่ง 🚐';}

}

// SEAT GRID (โค้ดเดิมของไอซ์)
function renderVans(bookedList){
  const mapping={};
  bookedList.forEach(b=>{if(b.seat)mapping[String(b.seat)]=b.nickname||'เต็ม';});
  ['A','B','C'].forEach(prefix=>{
    const grid=document.getElementById('v'+prefix);grid.innerHTML='';
    BUS_GRID_STRUCTURE.forEach(n=>{
      const cell=document.createElement('div');
      if(n==='driver'){cell.className='seat driver';cell.innerHTML='<span>👨‍✈️</span><span style="font-size:9px">คนขับ</span>';}
      else if(n==='spacer'){cell.className='seat spacer';}
      else{
        const id=prefix+(n==='เบาะซ้าย'?'ซ้าย':n);cell.className='seat';
        if(mapping[id]){
          if(mapping[id]==='งดจอง'){cell.classList.add('hidden-seat');}
          else{cell.classList.add('booked');cell.innerHTML=`<span style="font-size:9px">${id}</span><div style="font-size:11px">${mapping[id]}</div>`;}
        }else{
          cell.classList.add('empty');
          if(id===selSeat)cell.classList.add('selected');
          cell.innerHTML=`<span style="font-size:10px">เบาะ</span><span style="font-size:14px">${id}</span>`;
          cell.onclick=()=>pickSeat(cell,id);
        }
      }
      grid.appendChild(cell);
    });
  });
}
function pickSeat(el,id){
  fetch(API_URL,{method:'POST',body:new URLSearchParams({action:'lockSeat',seat:id,date:document.getElementById('fDateRaw').value})});
  selSeat=id;
  document.querySelectorAll('.seat.empty,.seat.selected').forEach(s=>s.classList.remove('selected'));
  el.classList.add('selected');
  document.getElementById('fSeat').value=id;
  document.getElementById('formBox').classList.add('show');
  chkBook();
  setTimeout(()=>document.getElementById('formBox').scrollIntoView({behavior:'smooth',block:'center'}),200);
}
function chkBook(){
  const ok=['fName','fNick','fPhone','fLine','fSeat'].every(id=>document.getElementById(id).value.trim()!=='');
  const btn=document.getElementById('confBtn');
  btn.disabled=!ok;btn.classList.toggle('on',ok);
  btn.innerText=ok?'👉 พร้อมแล้ว...ไปโอนเงินกันเลย! ✨':'🚀 กรอกข้อมูลให้ครบและเลือกที่นั่ง';
}

// PAYMENT
function openPay(){document.getElementById('slipChk').checked=false;document.getElementById('payBtn').disabled=true;document.getElementById('payBg').classList.add('show');}
function closePay(){document.getElementById('payBg').classList.remove('show');}
function submitBook(){
  const btn=document.getElementById('payBtn');btn.innerText='⌛ กำลังส่งข้อมูล...';btn.disabled=true;
  const payload={date:document.getElementById('fDateRaw').value,trip:document.getElementById('bTrip').value,seat:document.getElementById('fSeat').value,name:document.getElementById('fName').value,nickname:document.getElementById('fNick').value,phone:document.getElementById('fPhone').value,line:document.getElementById('fLine').value,confirm:'true'};
  const form=document.createElement('form');form.method='POST';form.action=API_URL;form.style.display='none';
  for(const k in payload){const i=document.createElement('input');i.name=k;i.value=payload[k];form.appendChild(i);}
  document.body.appendChild(form);
  const ifr=document.createElement('iframe');ifr.name='_ifr_post';ifr.style.display='none';document.body.appendChild(ifr);
  form.target='_ifr_post';form.submit();
  setTimeout(()=>{
    closePay();
    document.getElementById('rName').innerText=payload.name;
    document.getElementById('rTrip').innerText=payload.trip;
    document.getElementById('rDate').innerText=new Date(payload.date).toLocaleDateString('th-TH',{day:'numeric',month:'short',year:'2-digit'});
    document.getElementById('rSeat').innerText=payload.seat;
    document.getElementById('successPage').classList.add('show');
    allBookings.push(payload);renderMyTrips();
  },1800);
}
function goHome(){document.getElementById('successPage').classList.remove('show');document.getElementById('bookingPage').classList.remove('show');switchTab('home');renderHome();}

// LOGOUT
function logOut(){Swal.fire({title:'ออกจากระบบ?',text:'ต้องล็อกอินด้วยเบอร์ใหม่อีกครั้ง',icon:'warning',showCancelButton:true,confirmButtonText:'ออกเลย',cancelButtonText:'ยกเลิก',background:'#0c1421',color:'#f1f5f9',confirmButtonColor:'#ef4444'}).then(r=>{if(r.isConfirmed){localStorage.removeItem('tnhUser');location.reload();}});}

// DRAWER
function openDrawer(){document.getElementById('drawer').classList.add('open');document.getElementById('ov').style.display='block';}
function closeDrawer(){document.getElementById('drawer').classList.remove('open');document.getElementById('ov').style.display='none';}

// UTILS
function appendScript(src){const s=document.createElement('script');s.src=src;document.body.appendChild(s);}
</script>
