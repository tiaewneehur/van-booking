
<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <title>จองที่นั่งรถตู้ - เที่ย นี่เหอะ 🚐✨</title>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=IBM+Plex+Sans+Thai:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    /* --- CSS ของเดิมทั้งหมด --- */
    * { box-sizing: border-box !important; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { font-family: 'Inter', 'IBM Plex Sans Thai', sans-serif; background: #070a13; color: #f1f5f9; min-height: 100vh; overflow-x: hidden; }

    /* 🛡️ Login Layer (เพิ่มใหม่) */
    #loginOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #070a13; z-index: 5000; display: flex; align-items: center; justify-content: center; }
    .login-card { width: 90%; max-width: 400px; text-align: center; background: rgba(30, 41, 59, 0.7); padding: 40px 25px; border-radius: 30px; border: 1px solid rgba(56, 189, 248, 0.3); box-shadow: 0 20px 50px rgba(0,0,0,0.5); }

    /* 🏷️ Header ปรับขนาดให้เล็กลงตามสั่ง */
    .header-sticky { position: sticky; top: 0; width: 100%; background: rgba(7, 10, 19, 0.85); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); z-index: 1000; padding: 10px 15px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .header-brand { display: flex; align-items: center; gap: 8px; }
    .header-brand img { width: 40px; height: 40px; border-radius: 50%; border: 2px solid #38bdf8; }
    .header-brand h1 { font-size: 19px; color: #38bdf8; font-weight: 700; line-height: 1.0; } /* เล็กลงเพื่อไม่ให้หล่น */
    .brand-text span { font-size: 9px; color: #38bdf8; font-weight: 700; letter-spacing: 0.5px; display: block; margin-top: 2px; }

    /* ส่วนอื่นๆ คงไว้ตามเดิม */
    .menu-trigger { background: rgba(56, 189, 248, 0.15); color: #38bdf8; border: 1px solid #38bdf8; padding: 6px 8px; border-radius: 10px; font-weight: 600; font-size: 11px; cursor: pointer; }
    .side-menu { position: fixed; top: 0; right: -100%; width: 80%; height: 100%; background: #0f172a; z-index: 2000; transition: 0.4s; padding: 25px; overflow-y: auto; }
    .side-menu.active { right: 0; }
    .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; z-index: 1999; backdrop-filter: blur(4px); }

    .main-wrapper { padding: 20px 15px 120px; display: flex; flex-direction: column; align-items: center; }
    .card { width: 100%; max-width: 420px; background: rgba(30, 41, 59, 0.7); border-radius: 30px; padding: 25px; border: 1px solid rgba(255,255,255,0.1); }
    .subtitle { color: #94a3b8; font-size: 13px; margin: 10px 0 25px; text-align: center; }

    .field-input { width: 100%; padding: 0 14px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.1); font-size: 16px; background: #0f172a; color: white; height: 54px; outline: none; }
    .seat-map-img { width: 100%; border-radius: 20px; margin: 10px 0 20px; border: 1px solid rgba(255,255,255,0.08); }

    .grid { display: grid !important; grid-template-columns: repeat(4, 1fr) !important; gap: 8px !important; padding: 12px !important; background: rgba(0,0,0,0.3); border-radius: 24px; margin-bottom: 20px; }
    .seat { aspect-ratio: 1/1; border-radius: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; font-weight: 700; transition: 0.2s; position: relative; }
    .seat.driver { background: #1e293b; color: #475569; border: 1px dashed #475569; pointer-events: none; }
    .seat.spacer { visibility: hidden; pointer-events: none; }
    .seat.empty { background: linear-gradient(145deg, #10b981, #059669); color: white; box-shadow: 0 4px 0 #047857; }
    .seat.booked { background: linear-gradient(145deg, #ef4444, #b91c1c); color: white; box-shadow: 0 4px 0 #991b1b; cursor: not-allowed; font-size: 10px; }
    .seat.selected { background: linear-gradient(145deg, #fbbf24, #f59e0b); color: #000; box-shadow: 0 4px 0 #b45309; transform: scale(1.05); }
    
    #formBox { margin-top: 20px; display: none; }
    #formBox.visible { display: block; animation: fadeIn 0.4s; }

    .bottom-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(15px); padding: 15px 20px 30px; border-top: 1px solid rgba(255,255,255,0.1); z-index: 1000; display: flex; justify-content: center; }
    .btn-main { width: 100%; max-width: 400px; padding: 18px; border-radius: 18px; border: none; font-size: 18px; font-weight: 700; background: #334155; color: #64748b; cursor: pointer; }
    .btn-main.active { background: #38bdf8; color: #0f172a; box-shadow: 0 8px 20px rgba(56, 189, 248, 0.4); }

    .modal { display: none; position: fixed; z-index: 3000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); padding: 20px; align-items: center; justify-content: center; }
    .modal-content { background: #1e293b; width: 100%; max-width: 400px; border-radius: 30px; padding: 30px; text-align: center; }

    .hidden { display: none !important; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body oninput="validateAll()">

<div id="loginOverlay">
  <div class="login-card">
    <img src="เที่ย นี่เหอะ.png" style="width: 120px; height: 120px; border-radius: 50%; border: 4px solid #38bdf8; margin-bottom: 25px; object-fit: cover;">
    <h2 style="color:#fff; margin-bottom: 5px;">เข้าสู่ระบบ</h2>
    <p style="color:#94a3b8; font-size:14px; margin-bottom:25px;">กรอกเบอร์โทรศัพท์เพื่อเข้าใช้งาน</p>
    <input id="loginPhone" type="tel" class="field-input" placeholder="เบอร์โทรศัพท์ 10 หลัก" maxlength="10">
    <button onclick="handleLogin()" class="btn-main active" style="margin-top:20px;">ยืนยัน 🚀</button>
  </div>
</div>

<div class="header-sticky">
  <div class="header-brand">
    <img src="เที่ย นี่เหอะ.png" alt="Logo">
    <div class="brand-text">
      <h1>เที่ย นี่เหอะ</h1>
      <span>TIAEWNEEHUR</span>
      <small id="userDisplay" style="color:#94a3b8; font-size:9px;">User: -</small>
    </div>
  </div>
  <div style="display:flex; gap:5px;">
    <button class="menu-trigger" onclick="toggleSideMenu('trips')">📋 ทริป</button>
    <button class="menu-trigger" onclick="toggleSideMenu('mine')" style="background:rgba(16,185,129,0.15); color:#10b981; border-color:#10b981;">📌 จอง</button>
    <button class="menu-trigger" onclick="handleLogout()" style="background:rgba(239,68,68,0.15); color:#ef4444; border-color:#ef4444;">ออก</button>
  </div>
</div>

<div id="overlay" class="overlay" onclick="closeAllMenus()"></div>
<div id="sideMenu" class="side-menu"><div id="sideMenuContent"></div></div>

<div class="main-wrapper">
  <div class="card">
    <h1 style="font-size: 22px; color: #fff; text-align:center;">จองที่นั่งรถตู้ 🚐💨</h1>
    <p class="subtitle">จองก่อนได้นั่ง จองทีหลังยืนไปนะจ๊ะ ✨</p>

    <form id="bookingForm">
      <div class="field-group" style="margin-bottom:18px;">
        <label style="color:#38bdf8; font-size:14px; font-weight:600; display:block; margin-bottom:8px;">📅 วันเดินทาง</label>
        <input id="date" name="date" type="date" class="field-input" required onchange="handleDateChange()" />
      </div>

      <div class="field-group" style="margin-bottom:18px;">
        <label style="color:#38bdf8; font-size:14px; font-weight:600; display:block; margin-bottom:8px;">⛺ ชื่อทริป</label>
        <input id="trip" name="trip" type="text" class="field-input" placeholder="เลือกทริปจากเมนูขวาบน" required readonly />
      </div>

      <img src="IMG_0444.jpeg" class="seat-map-img" alt="ผังรถ" />

      <div class="van-container"><div id="grid-A" class="grid"></div></div>
      <div class="van-container"><div id="grid-B" class="grid"></div></div>
      <div class="van-container"><div id="grid-C" class="grid"></div></div>

      <input id="seatField" name="seat" type="hidden" />
      <div id="formBox">
        <h3 style="text-align: center; color: #38bdf8; margin-bottom: 20px; font-size: 18px;">📝 ข้อมูลผู้จอง</h3>
        <input id="name" name="name" type="text" class="field-input" placeholder="ชื่อ-นามสกุลจริง" required style="margin-bottom:15px;">
        <div style="display:flex; gap:12px; margin-bottom:15px;">
          <input id="nickname" name="nickname" type="text" class="field-input" placeholder="ชื่อเล่น" required>
          <input id="phone" name="phone" type="tel" class="field-input" readonly>
        </div>
        <input id="line" name="line" type="text" class="field-input" placeholder="ใส่ชื่อไลน์นะจ๊ะ" required>
      </div>
    </form>
  </div>
</div>

<div class="bottom-bar">
  <button type="button" id="mainPayBtn" onclick="showPayment()" class="btn-main" disabled>🚀 พร้อมแล้ว...ไปโอนเงิน!</button>
</div>

<div id="payModal" class="modal">
  <div class="modal-content">
    <h2 style="color: #38bdf8; margin-bottom: 15px;">💰 ชำระมัดจำ</h2>
    <img src="slip-qr.png" style="width:100%; border-radius:15px; margin-bottom:15px;">
    <p style="color:#ef4444; font-size:14px; margin-bottom:15px;">นำสลีปไปอัพโหลดใส่อัลบั้มในกลุ่ม</p>
    <button onclick="finalSubmit()" class="btn-main active" style="background:#10b981;">✅ ยืนยันจองสำเร็จ!</button>
    <button onclick="document.getElementById('payModal').style.display='none'" style="background:none; border:none; color:#94a3b8; margin-top:20px;">ย้อนกลับ</button>
  </div>
</div>

<script>
/* ------------------------------------------------------------------
   ⚙️ SYSTEM LOGIC (ห้ามยุ่ง - คืนค่าเดิม 100% ตามสั่ง)
   ------------------------------------------------------------------ */
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw7OvKq9CZ2bgRI61UpGVTCqYYSm4xSz4DcDwkwEaTXG0yfhldX34Bmnqi5m7y6cnS-/exec";
const READ_URL = SCRIPT_URL + "?action=read";
const SEAT_LAYOUT = ['driver', 3, 6, 9, 'spacer', 2, 5, 8, 'เบาะซ้าย', 1, 4, 7];

let currentUser = localStorage.getItem('van_user_phone') || "";

// ระบบ Login Overlay
if (currentUser) {
    document.getElementById('loginOverlay').classList.add('hidden');
    document.getElementById('userDisplay').innerText = "User: " + currentUser;
    document.getElementById('phone').value = currentUser;
}

function handleLogin() {
    const p = document.getElementById('loginPhone').value;
    if (p.length < 10) return Swal.fire('เบอร์ไม่ครบ', 'กรุณากรอกเบอร์โทร 10 หลัก', 'error');
    localStorage.setItem('van_user_phone', p);
    location.reload();
}

function handleLogout() {
    localStorage.removeItem('van_user_phone');
    location.reload();
}

// Logic การจองเดิมทั้งหมด
function handleDateChange() {
  const dateVal = document.getElementById('date').value;
  ['A','B','C'].forEach(id => document.getElementById(`grid-${id}`).innerHTML = '⌛ กำลังเช็ค...');
  loadBookedJSONP(dateVal, renderAllVans);
}

function loadBookedJSONP(date, callback) {
  const cbName = "cb_" + Date.now();
  window[cbName] = (data) => { callback(data.bookings || []); delete window[cbName]; };
  const script = document.createElement('script');
  script.src = `${READ_URL}&date=${encodeURIComponent(date)}&callback=${cbName}`;
  document.body.appendChild(script);
}

function renderAllVans(bookedArray) {
  const bookedMap = {}; 
  bookedArray.forEach(b => { if(b.seat) bookedMap[String(b.seat)] = b.nickname || 'เต็ม'; });

  ['A', 'B', 'C'].forEach(prefix => {
    const grid = document.getElementById(`grid-${prefix}`);
    grid.innerHTML = '';
    SEAT_LAYOUT.forEach(n => {
      const div = document.createElement('div');
      if (n === 'driver') { div.className = 'seat driver'; div.innerHTML = `👨‍✈️`; }
      else if (n === 'spacer') { div.className = 'seat spacer'; }
      else {
        const sid = prefix + n; div.className = 'seat';
        if (bookedMap[sid]) {
          div.classList.add('booked');
          div.innerHTML = `<span style="font-size:8px;">${sid}</span><br>${bookedMap[sid]}`;
        } else {
          div.classList.add('empty');
          div.innerHTML = `<span>${sid === prefix+'เบาะซ้าย' ? prefix+'ซ' : sid}</span>`;
          div.onclick = () => selectSeat(div, sid);
        }
      }
      grid.appendChild(div);
    });
  });
}

function selectSeat(el, id) {
    if (!document.getElementById('date').value || !document.getElementById('trip').value) {
        return Swal.fire('ข้อมูลไม่ครบ', 'กรุณาเลือกวันและทริปก่อนนะจ๊ะ', 'warning');
    }
    document.querySelectorAll('.seat').forEach(s => s.classList.remove('selected'));
    el.classList.add('selected');
    document.getElementById('seatField').value = id;
    document.getElementById('formBox').classList.add('visible');
    validateAll();
    setTimeout(() => document.getElementById('formBox').scrollIntoView({behavior:'smooth'}), 400);
}

function validateAll() {
  const fields = ['date', 'trip', 'seatField', 'name', 'nickname', 'phone', 'line'];
  const ok = fields.every(id => document.getElementById(id).value.trim() !== "");
  const btn = document.getElementById('mainPayBtn');
  btn.disabled = !ok;
  if(ok) btn.classList.add('active'); else btn.classList.remove('active');
}

function showPayment() { document.getElementById('payModal').style.display = 'flex'; }

function finalSubmit() {
  const btn = document.querySelector('#payModal .btn-main');
  btn.innerHTML = "⌛ กำลังส่งข้อมูล..."; btn.disabled = true;
  const form = document.getElementById('bookingForm');
  const fd = new FormData(form);
  // ส่งข้อมูลแบบเดิม (POST ไปยัง Script URL)
  fetch(SCRIPT_URL, { method: 'POST', body: fd, mode: 'no-cors' })
  .then(() => {
    Swal.fire('จองสำเร็จ! 🎒', 'ตรวจสอบรายการได้ที่เมนู "จอง"', 'success').then(() => location.reload());
  });
}

// ระบบ Side Menu และ ยกเลิก (Action=Cancel)
function toggleSideMenu(mode) {
  const menu = document.getElementById('sideMenu');
  const overlay = document.getElementById('overlay');
  menu.classList.add('active');
  overlay.style.display = 'block';
  if(mode === 'trips') fetchTripList();
  else if(mode === 'mine') fetchMyBookings();
}

function closeAllMenus() {
    document.getElementById('sideMenu').classList.remove('active');
    document.getElementById('overlay').style.display = 'none';
}

function fetchTripList() {
    const content = document.getElementById('sideMenuContent');
    content.innerHTML = '<h2 style="color:#38bdf8; margin-bottom:20px;">📍 ทริปที่เปิดจอง</h2><p>กำลังโหลด...</p>';
    const cb = "cb_list";
    window[cb] = (data) => {
        const tripData = data.bookings.filter(b => b.trip && b.date).map(b => ({ trip: b.trip, date: b.date }));
        const unique = Array.from(new Set(tripData.map(a => JSON.stringify(a)))).map(a => JSON.parse(a));
        content.innerHTML = '<h2 style="color:#38bdf8; margin-bottom:20px;">📍 ทริปที่เปิดจอง</h2>' + unique.map(item => `
            <div style="background:rgba(255,255,255,0.05); padding:15px; border-radius:15px; border-left:4px solid #38bdf8; cursor:pointer; margin-bottom:10px;" onclick="setTrip('${item.trip}', '${item.date}')">
                <div style="font-weight:700; color:#fff;">${item.trip}</div>
                <div style="font-size:12px; color:#38bdf8;">📅 ${new Date(item.date).toLocaleDateString('th-TH')}</div>
            </div>`).join('');
    };
    const s = document.createElement('script'); s.src = `${READ_URL}&callback=${cb}`; document.body.appendChild(s);
}

function setTrip(name, date) {
    document.getElementById('trip').value = name;
    if (date) document.getElementById('date').value = date.split('T')[0];
    closeAllMenus(); handleDateChange(); validateAll();
}

function fetchMyBookings() {
    const content = document.getElementById('sideMenuContent');
    content.innerHTML = '<h2 style="color:#10b981; margin-bottom:20px;">🎒 ของฉันที่จองไว้</h2><p>กำลังค้นหา...</p>';
    const cb = "cb_my";
    window[cb] = (data) => {
        const mine = data.bookings.filter(b => b.phone === currentUser);
        content.innerHTML = '<h2 style="color:#10b981; margin-bottom:20px;">🎒 ของฉันที่จองไว้</h2>';
        if(mine.length > 0) {
            content.innerHTML += mine.map(b => `
                <div style="background:rgba(56,189,248,0.1); padding:15px; border-radius:15px; margin-bottom:12px; display:flex; justify-content:space-between; align-items:center;">
                    <div><div style="font-weight:700; color:#fff;">${b.trip}</div><div style="font-size:11px; color:#38bdf8;">${b.seat} | ${b.date.split('T')[0]}</div></div>
                    <button onclick="confirmCancel('${b.date}','${b.seat}')" style="background:#ef4444; color:white; border:none; padding:8px 12px; border-radius:8px; font-weight:700;">ยกเลิก</button>
                </div>`).join('');
        } else { content.innerHTML += '<p style="color:#94a3b8;">ยังไม่มีข้อมูลจองจ้า</p>'; }
    };
    const s = document.createElement('script'); s.src = `${READ_URL}&callback=${cb}`; document.body.appendChild(s);
}

function confirmCancel(date, seat) {
    Swal.fire({
        title: 'ยกเลิกการจอง?',
        text: `ที่นั่ง ${seat} วันที่ ${date.split('T')[0]}`,
        icon: 'warning',
        showCancelButton: true,
        confirmButtonColor: '#ef4444',
        confirmButtonText: 'ยืนยันยกเลิก'
    }).then((r) => {
        if (r.isConfirmed) {
            window.location.href = `${SCRIPT_URL}?action=cancel&date=${date}&seat=${seat}&phone=${currentUser}`;
        }
    });
}

renderAllVans([]);
</script>
</body>
</html>
