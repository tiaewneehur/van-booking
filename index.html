
<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <title>จองที่นั่งรถตู้ - เที่ยวนี่เหอะ 🚐✨</title>

  <style>
    * { box-sizing: border-box !important; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { font-family: 'Inter', 'IBM Plex Sans Thai', sans-serif; background: #070a13; color: #f1f5f9; min-height: 100vh; overflow-x: hidden; }

    .header-sticky { position: sticky; top: 0; width: 100%; background: rgba(7, 10, 19, 0.85); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); z-index: 1000; padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .header-brand { display: flex; align-items: center; gap: 10px; }
    .header-brand img { width: 48px; height: 48px; border-radius: 50%; border: 2px solid #38bdf8; }
    .header-brand h1 { font-size: 24px; color: #38bdf8; font-weight: 700; line-height: 1.0; }

    .menu-trigger { background: rgba(56, 189, 248, 0.15); color: #38bdf8; border: 1px solid #38bdf8; padding: 8px 12px; border-radius: 12px; font-weight: 600; font-size: 12px; cursor: pointer; }
    .side-menu { position: fixed; top: 0; right: -100%; width: 80%; height: 100%; background: #0f172a; z-index: 2000; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); padding: 25px; overflow-y: auto; box-shadow: -10px 0 30px rgba(0,0,0,0.5); }
    .side-menu.active { right: 0; }
    .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; z-index: 1999; backdrop-filter: blur(4px); }

    .main-wrapper { padding: 20px 15px 120px; display: flex; flex-direction: column; align-items: center; }
    .card { width: 100%; max-width: 420px; background: rgba(30, 41, 59, 0.7); border-radius: 30px; padding: 25px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
    .subtitle { color: #94a3b8; font-size: 13px; margin: 10px 0 25px; text-align: center; }

    .field-group { width: 100%; margin-bottom: 18px; text-align: left; }
    .field-label { font-weight: 600; margin-bottom: 8px; font-size: 14px; color: #38bdf8; display: block; }

    .field-input { 
        width: 100%;
        padding: 0 14px;
        border-radius: 16px; 
        border: 1px solid rgba(255,255,255,0.1); 
        font-size: 16px; 
        background: #0f172a; 
        color: white; 
        height: 54px;
        outline: none; 
        font-family: inherit;
        box-sizing: border-box;
        appearance: none;
        -webkit-appearance: none;
    }

    input[type="date"] { padding-right: 10px; }
    input[type="date"]::-webkit-calendar-picker-indicator { opacity: 0.7; }

    .seat-map-img { width: 100%; border-radius: 20px; margin: 10px 0 20px; border: 1px solid rgba(255,255,255,0.08); }

    .van-container { margin-bottom: 30px; width: 100%; }
    .van-title { font-size: 14px; color: #38bdf8; margin-bottom: 10px; font-weight: 700; text-align: center; background: rgba(56,189,248,0.1); padding: 5px; border-radius: 10px; }
    
    .grid-header { display: flex; justify-content: space-between; padding: 0 10px; margin-bottom: 5px; font-size: 11px; font-weight: 700; color: #38bdf8; opacity: 0.8; }

    .grid { display: grid !important; grid-template-columns: repeat(4, 1fr) !important; gap: 8px !important; padding: 12px !important; background: rgba(0,0,0,0.3); border-radius: 24px; border: 1px solid rgba(255,255,255,0.05); }
    .seat { aspect-ratio: 1/1; border-radius: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; font-weight: 700; transition: 0.2s; position: relative; }
    
    .seat.driver { background: #1e293b; color: #475569; border: 1px dashed #475569; cursor: default; pointer-events: none; }
    .seat.spacer { visibility: hidden; pointer-events: none; }

    .seat.empty { background: linear-gradient(145deg, #10b981, #059669); color: white; box-shadow: 0 4px 0 #047857; }
    .seat.booked { background: linear-gradient(145deg, #ef4444, #b91c1c); color: white; box-shadow: 0 4px 0 #991b1b; cursor: not-allowed; font-size: 10px; }
    .seat.selected { background: linear-gradient(145deg, #fbbf24, #f59e0b); color: #000; box-shadow: 0 4px 0 #b45309; transform: scale(1.05); animation: heartbeat 0.8s infinite; }
    
    /* 🟠 เพิ่ม CSS ส้ม สำหรับคนอื่นที่กำลังเลือกเบาะนี้ */
    .seat.locking { background: linear-gradient(145deg, #f97316, #ea580c); color: white; box-shadow: 0 4px 0 #c2410c; cursor: not-allowed; }
    .seat.locking::after { content: "⏳ กำลังเลือก"; font-size: 8px; display: block; margin-top: 2px; background: rgba(0,0,0,0.3); padding: 1px 4px; border-radius: 4px; }

    @keyframes heartbeat { 0%, 100% { transform: scale(1.05); } 50% { transform: scale(1.10); } }

    #formBox { margin-top: 20px; padding: 20px; background: rgba(56, 189, 248, 0.05); border-radius: 25px; border: 1px solid rgba(56, 189, 248, 0.3); display: none; }
    #formBox.visible { display: block; animation: fadeIn 0.4s; }

    .bottom-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(15px); padding: 15px 20px 30px; border-top: 1px solid rgba(255,255,255,0.1); z-index: 1000; display: flex; justify-content: center; }
    .btn-main { width: 100%; max-width: 400px; padding: 18px; border-radius: 18px; border: none; font-size: 18px; font-weight: 700; font-family: inherit; transition: 0.3s; cursor: pointer; background: #334155; color: #64748b; }
    .btn-main.active { background: #38bdf8; color: #0f172a; box-shadow: 0 8px 20px rgba(56, 189, 248, 0.4); }

    .modal { display: none; position: fixed; z-index: 3000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); padding: 20px; overflow-y: scroll; align-items: flex-start; justify-content: center; }
    .modal-content { background: #1e293b; width: 100%; max-width: 400px; border-radius: 30px; padding: 30px; text-align: center; border: 1px solid rgba(255,255,255,0.1); margin-top: 20px; margin-bottom: 50px; }
    .qr-img { width: 100%; border-radius: 20px; border: 5px solid white; margin: 15px 0; }
    .btn-final { background: #10b981; color: white; width: 100%; padding: 18px; border-radius: 15px; border: none; font-size: 18px; font-weight: 700; cursor: pointer; }
    .btn-final:disabled { background: #334155; color: #64748b; cursor: not-allowed; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
