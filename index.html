
<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <title>จองที่นั่งรถตู้ - เที่ยวนี่เหอะ 🚐✨</title>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=IBM+Plex+Sans+Thai:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>

    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
      -webkit-tap-highlight-color:transparent;
    }

    body{
      font-family:'Inter','IBM Plex Sans Thai',sans-serif;
      background:#070a13;
      color:#f1f5f9;
      min-height:100vh;
      overflow-x:hidden;
    }

    .header-sticky{
      position:sticky;
      top:0;
      width:100%;
      background:rgba(7,10,19,.85);
      backdrop-filter:blur(12px);
      z-index:1000;
      padding:12px 20px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      border-bottom:1px solid rgba(255,255,255,.1);
    }

    .header-brand{
      display:flex;
      align-items:center;
      gap:10px;
    }

    .header-brand img{
      width:48px;
      height:48px;
      border-radius:50%;
      border:2px solid #38bdf8;
    }

    .header-brand h1{
      font-size:24px;
      color:#38bdf8;
      font-weight:700;
    }

    .menu-trigger{
      background:rgba(56,189,248,.15);
      color:#38bdf8;
      border:1px solid #38bdf8;
      padding:8px 12px;
      border-radius:12px;
      font-weight:600;
      font-size:12px;
      cursor:pointer;
    }

    .side-menu{
      position:fixed;
      top:0;
      right:-100%;
      width:80%;
      height:100%;
      background:#0f172a;
      z-index:2000;
      transition:.4s;
      padding:25px;
      overflow-y:auto;
    }

    .side-menu.active{
      right:0;
    }

    .overlay{
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background:rgba(0,0,0,.7);
      display:none;
      z-index:1999;
    }

    .main-wrapper{
      padding:20px 15px 120px;
      display:flex;
      justify-content:center;
    }

    .card{
      width:100%;
      max-width:420px;
      background:rgba(30,41,59,.7);
      border-radius:30px;
      padding:25px;
      border:1px solid rgba(255,255,255,.1);
    }

    .subtitle{
      color:#94a3b8;
      font-size:13px;
      margin:10px 0 25px;
      text-align:center;
    }

    .field-group{
      margin-bottom:18px;
    }

    .field-label{
      display:block;
      margin-bottom:8px;
      color:#38bdf8;
      font-weight:600;
    }

    .field-input{
      width:100%;
      height:54px;
      border-radius:16px;
      border:1px solid rgba(255,255,255,.1);
      background:#0f172a;
      color:#fff;
      padding:0 14px;
      font-size:16px;
      outline:none;
    }

    .seat-map-img{
      width:100%;
      border-radius:20px;
      margin:10px 0 20px;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:8px;
      padding:12px;
      background:rgba(0,0,0,.3);
      border-radius:24px;
    }

    .seat{
      aspect-ratio:1/1;
      border-radius:12px;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      font-weight:700;
    }

    .seat.empty{
      background:#10b981;
      cursor:pointer;
    }

    .seat.booked{
      background:#ef4444;
      font-size:10px;
    }

    .seat.holding{
      background:#fb923c;
      animation:pulseHold 1s infinite;
    }

    .seat.selected{
      background:#f59e0b;
      color:#000;
    }

    .seat.driver{
      background:#1e293b;
      pointer-events:none;
    }

    .seat.spacer{
      visibility:hidden;
    }

    @keyframes pulseHold{
      0%,100%{opacity:1;}
      50%{opacity:.6;}
    }

  </style>

  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body>

<div class="header-sticky">

  <div class="header-brand">
    <img src="เที่ย นี่เหอะ.png">
    <div>
      <h1>เที่ยวนี่เหอะ</h1>
      <span>TIAEWNEEHUR</span>
    </div>
  </div>

  <button
    class="menu-trigger"
    onclick="toggleSideMenu()"
  >
    📋 ทริปที่จัด
  </button>

</div>

<div
  id="overlay"
  class="overlay"
  onclick="toggleSideMenu()"
></div>

<div
  id="sideMenu"
  class="side-menu"
>
  <h2 style="color:#38bdf8;margin-bottom:20px;">
    📍 ทริปที่เปิดจอง
  </h2>

  <div id="tripListContent">
    กำลังโหลด...
  </div>
</div>

<div class="main-wrapper">

  <div class="card">

    <h1
      style="
        text-align:center;
        font-size:22px;
      "
    >
      จองที่นั่งรถตู้ 🚐💨
    </h1>

    <p class="subtitle">
      จองก่อนได้นั่ง จองทีหลังยืน
    </p>

    <form id="bookingForm">

      <div class="field-group">

        <label class="field-label">
          📅 วันเดินทาง
        </label>

        <input
          id="date"
          type="date"
          class="field-input"
          onchange="handleDateChange()"
        >

      </div>

      <div class="field-group">

        <label class="field-label">
          ⛺ ชื่อทริป
        </label>

        <input
          id="trip"
          type="text"
          class="field-input"
        >

      </div>

      <img
        src="/IMG_0444.jpeg"
        class="seat-map-img"
      >

      <div id="grid-A" class="grid"></div>

    </form>

  </div>

</div>

<script>

const SCRIPT_URL =
"https://script.google.com/macros/s/AKfycbw7OvKq9CZ2bgRI61UpGVTCqYYSm4xSz4DcDwkwEaTXG0yfhldX34Bmnqi5m7y6cnS-/exec";

const READ_URL =
SCRIPT_URL + "?action=read";

const SEAT_LAYOUT = [
  'driver',3,6,9,
  'spacer',2,5,8,
  'เบาะซ้าย',1,4,7
];

function loadBookedJSONP(date, callback){

  if(!date) return;

  const cbName =
    "cb_" + Date.now();

  window[cbName] = (data)=>{

    callback(data.bookings || []);

    delete window[cbName];

    script.remove();

  };

  const script =
    document.createElement('script');

  script.src =
    `${READ_URL}&date=${encodeURIComponent(date)}&callback=${cbName}`;

  document.body.appendChild(script);

}
  function handleDateChange(){

  const dateVal =
    document.getElementById('date').value;

  loadBookedJSONP(
    dateVal,
    renderAllVans
  );

}

function renderAllVans(bookedArray){

  const bookedMap = {};

  bookedArray.forEach(b => {

    if(b.seat){

      bookedMap[String(b.seat)] = {
        status:b.status || 'booked',
        nickname:b.nickname || 'เต็ม'
      };

    }

  });

  const grid =
    document.getElementById('grid-A');

  grid.innerHTML = '';

  SEAT_LAYOUT.forEach(n => {

    const div =
      document.createElement('div');

    if(n === 'driver'){

      div.className =
        'seat driver';

      div.innerHTML = `
        👨‍✈️
      `;

    }

    else if(n === 'spacer'){

      div.className =
        'seat spacer';

    }

    else{

      const seatID = "A" + n;

      div.className = 'seat';

      if(
        bookedMap[seatID]?.status ===
        'booked'
      ){

        div.classList.add('booked');

        div.innerHTML = `
          <span>${seatID}</span>
          <div>
            ${bookedMap[seatID].nickname}
          </div>
        `;

      }

      else if(
        bookedMap[seatID]?.status ===
        'holding'
      ){

        div.classList.add('holding');

        div.innerHTML = `
          <span>${seatID}</span>
          <div>
            กำลังเลือก
          </div>
        `;

      }

      else{

        div.classList.add('empty');

        const displayLabel =
          n === 'เบาะซ้าย'
          ? 'Aซ้าย'
          : 'A' + n;

        div.innerHTML = `
          <span>เบาะ</span>
          <span>
            ${displayLabel}
          </span>
        `;

        div.onclick = () =>
          holdSeat(div, seatID);

      }

    }

    grid.appendChild(div);

  });

}
  async function holdSeat(el, seatID){

  if(
    !document.getElementById('date').value
  ){
    return alert('📅 เลือกวันก่อน');
  }

  if(
    !document.getElementById('trip').value.trim()
  ){
    return alert('⛺ ใส่ชื่อทริปก่อน');
  }

  const data =
    new URLSearchParams();

  data.append("action","hold");
  data.append("seat",seatID);
  data.append(
    "date",
    document.getElementById('date').value
  );

  try{

    const res =
      await fetch(
        SCRIPT_URL,
        {
          method:"POST",
          body:data
        }
      );

    const result =
      await res.json();

    if(
      result.status === "success"
    ){

      document
        .querySelectorAll('.seat')
        .forEach(s =>
          s.classList.remove('selected')
        );

      el.classList.add('selected');

      handleDateChange();

    }

    else{

      Swal.fire({
        icon:'warning',
        title:'เบาะนี้มีคนเลือกอยู่ 😢'
      });

      handleDateChange();

    }

  }

  catch(err){

    console.log(err);

  }

}

function toggleSideMenu(){

  const menu =
    document.getElementById('sideMenu');

  const overlay =
    document.getElementById('overlay');

  const isActive =
    menu.classList.toggle('active');

  overlay.style.display =
    isActive ? 'block' : 'none';

  if(isActive){

    fetchTripList();

  }

}
  function fetchTripList(){

  const cbName =
    "cb_list_" + Date.now();

  const script =
    document.createElement('script');

  window[cbName] = (data) => {

    const tripData =
      data.bookings
      .filter(b =>
        b.trip && b.date
      )
      .map(b => ({
        trip:b.trip,
        date:b.date
      }));

    const uniqueTrips =
      Array.from(
        new Set(
          tripData.map(a =>
            JSON.stringify(a)
          )
        )
      ).map(a =>
        JSON.parse(a)
      );

    const content =
      document.getElementById(
        'tripListContent'
      );

    if(uniqueTrips.length > 0){

      content.innerHTML =
        uniqueTrips.map(item => {

          const d =
            new Date(item.date);

          const dateStr =
            d.toLocaleDateString(
              'th-TH',
              {
                day:'numeric',
                month:'short',
                year:'2-digit'
              }
            );

          return `
            <div
              style="
                background:rgba(255,255,255,.05);
                padding:15px;
                border-radius:12px;
                border-left:4px solid #38bdf8;
                cursor:pointer;
                margin-bottom:8px;
              "
              onclick="
                setTrip(
                  '${item.trip}',
                  '${item.date}'
                )
              "
            >

              <div
                style="
                  font-weight:700;
                  color:#fff;
                  font-size:15px;
                "
              >
                ${item.trip}
              </div>

              <div
                style="
                  font-size:12px;
                  color:#38bdf8;
                  margin-top:4px;
                "
              >
                📅 วันเดินทาง:
                ${dateStr}
              </div>

            </div>
          `;

        }).join('');

    }

    else{

      content.innerHTML =
        `
        <p
          style="
            color:#94a3b8;
            font-size:14px;
          "
        >
          ยังไม่มีข้อมูลทริป...
        </p>
        `;

    }

    delete window[cbName];

    script.remove();

  };

  script.src =
    `${READ_URL}&callback=${cbName}`;

  document.body.appendChild(script);

}
  function setTrip(name, dateValue){

  document.getElementById('trip').value =
    name;

  if(dateValue){

    const d =
      new Date(dateValue);

    const year =
      d.getFullYear();

    const month =
      String(
        d.getMonth() + 1
      ).padStart(2,'0');

    const day =
      String(
        d.getDate()
      ).padStart(2,'0');

    document.getElementById('date').value =
      `${year}-${month}-${day}`;

  }

  toggleSideMenu();

  handleDateChange();

}

renderAllVans([]);

setInterval(() => {

  const dateVal =
    document.getElementById('date').value;

  if(dateVal){

    loadBookedJSONP(
      dateVal,
      renderAllVans
    );

  }

}, 3000);

</script>

</body>
</html>
